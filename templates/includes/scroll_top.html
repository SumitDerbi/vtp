<!-- Scroll to Top Button -->
<div x-data="{ show: false }" x-on:scroll.window="show = window.scrollY > 300">
  <button x-show="show" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 translate-y-4" @click="window.scrollTo({ top: 0, behavior: 'smooth' })" aria-label="Scroll to top" class="fixed bottom-6 right-[5.5rem] z-50 bg-primary text-white w-11 h-11 rounded-full flex items-center justify-center shadow-lg hover:bg-sky-700 hover:scale-110 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-all duration-200">
    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/></svg>
  </button>
</div>
