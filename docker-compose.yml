services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
    volumes:
      - media_data:/app/media
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DATABASE_NAME:-vtp}
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD:-rootpassword}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - media_data:/app/media
    depends_on:
      - web
    restart: unless-stopped

volumes:
  mysql_data:
  media_data:
